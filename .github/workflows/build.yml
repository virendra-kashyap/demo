name: Spring Boot CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Give Execute Permission
        run: chmod +x mvnw

      - name: Build Project
        run: ./mvnw clean install

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar