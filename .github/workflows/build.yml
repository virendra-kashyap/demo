name: Spring Boot CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Give Execute Permission
        run: chmod +x mvnw

      - name: Build Project
        run: ./mvnw clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/springboot-demo:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/springboot-demo:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-demo:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/springboot-demo:latest

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar